apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: staging
  labels:
    app: notification-service
    team: platform-services
    version: v2.4.0
  annotations:
    kubernetes.io/change-cause: "Deploy v2.4.0 - add Kafka retry logic"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        version: v2.4.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: notification-service-sa
      terminationGracePeriodSeconds: 30
      containers:
        - name: notification-service
          image: nexus-docker.internal.hsbc/notification-service:v2.4.0-rc1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "staging"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m -XX:+UseG1GC"
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: notification-service-config
                  key: kafka.bootstrap.servers
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: notification-service-db-secret
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-service-db-secret
                  key: password
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: app-config
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: app-config
          configMap:
            name: notification-service-config
      imagePullSecrets:
        - name: nexus-registry-credentials
