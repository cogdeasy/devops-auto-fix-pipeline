version: "3.9"

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: autofix-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./docker/jenkins/init.groovy.d:/usr/share/jenkins/ref/init.groovy.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  nexus:
    image: sonatype/nexus3:latest
    container_name: autofix-nexus
    ports:
      - "8081:8081"
    volumes:
      - nexus_data:/nexus-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

volumes:
  jenkins_home:
  nexus_data:
